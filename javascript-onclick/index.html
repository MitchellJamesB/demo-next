<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
    <script>
        function showAlertMessage() {
            alert("PLEASE DO NOT LEAVE!");
        }
        function changeContent() {
            const myParagraph = document.getElementById("my-paragraph");
            myParagraph.innerHTML = "You have been warned!";
        }
    </script>
</head>

<body class="flex flex-col gap-y-12 p-24">
    <button onClick="showAlertMessage()"
        class="px-6 py-2 ng-indigo-100 hover:bg-indigo-200 active: bg-indigo-300 shadow-md transition-all cursor-pointer border-0 rounded-medium">Button
        one</button>
    <button onClick="changeContent()"
        class="px-6 py-2 ng-indigo-100 hover:bg-indigo-200 active: bg-indigo-300 shadow-md transition-all cursor-pointer border-0 rounded-medium">Button
        two</button>
    <p class="p-12 bg-stone-100 mt-12" id="my-paragraph">Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        Phasellus quis est vehicula, maximus mi id, sagittis nunc. Ut et tincidunt elit. Quisque mi est,
        imperdiet condimentum laoreet ve</p>
</body>

</html>
